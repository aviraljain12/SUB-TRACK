<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUB-TRACK - Login</title>
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/theme.js"></script>
</head>
<body>
    <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle Theme">
        <i class="fas fa-moon"></i>
    </button>
    <div class="auth-split">
        <!-- Left Panel - Branding -->
        <div class="auth-brand-panel">
            <div class="brand-content">
                <div class="brand-icon">
                    <i class="fas fa-layer-group"></i>
                </div>
                <h1 class="brand-title">SUB-TRACK</h1>
                <p class="brand-tagline">Manage all your subscriptions<br>in one place</p>
                <div class="brand-features">
                    <div class="feature-item">
                        <i class="fas fa-bell"></i>
                        <span>Smart renewal reminders</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-file-invoice"></i>
                        <span>Instant invoice downloads</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-chart-pie"></i>
                        <span>Track spending by service</span>
                    </div>
                </div>
            </div>
        </div>
        <!-- Right Panel - Auth Form -->
        <div class="auth-form-panel">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Login</button>
                    <button class="auth-tab" data-tab="signup">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            <span>Email</span>
                        </label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            <span>Password</span>
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div id="errorMsg" class="error-message"></div>
                    <button type="submit" class="btn primary">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Login</span>
                    </button>
                </form>

                <!-- Signup Form -->
                <form id="signupForm" class="auth-form hidden">
                    <div class="form-group">
                        <label for="signupName">
                            <i class="fas fa-user"></i>
                            <span>Full Name</span>
                        </label>
                        <input type="text" id="signupName" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">
                            <i class="fas fa-envelope"></i>
                            <span>Email</span>
                        </label>
                        <input type="email" id="signupEmail" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">
                            <i class="fas fa-lock"></i>
                            <span>Password</span>
                        </label>
                        <input type="password" id="signupPassword" name="password" placeholder="Min. 6 characters" required>
                    </div>
                    <div class="form-group">
                        <label for="signupConfirmPassword">
                            <i class="fas fa-lock"></i>
                            <span>Confirm Password</span>
                        </label>
                        <input type="password" id="signupConfirmPassword" placeholder="Re-enter password" required>
                    </div>
                    <div id="signupErrorMsg" class="error-message"></div>
                    <button type="submit" class="btn primary">Create Account</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/signup.js"></script>
</body>
</html>
